version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "=== AWS Amplify Build Started ==="
        - 'echo "Node.js version $(node --version)"'
        - 'echo "NPM version $(npm --version)"'
        - 'echo "Platform $(uname -a)"'
        - echo "Cleaning install..."
        - rm -rf node_modules package-lock.json
        - echo "Installing dependencies..."
        - npm install --legacy-peer-deps
        - npm rebuild
        - echo "Dependencies installed and rebuilt"
        - echo "Verifying critical dependencies..."
        - 'ls -la node_modules/@rollup/ || echo "Rollup modules not found - will use fallback"'
    build:
      commands:
        - echo "Building the application for AWS Amplify..."
        - npm run build
        - echo "Build completed successfully"
    postBuild:
      commands:
        - echo "=== Build Artifacts ==="
        - ls -la dist/
        - echo "=== Build completed successfully ==="
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .npm-cache/**/*
