name: Deploy Blockscout App

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'  # or your preferred Node.js version

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build
        
      - name: Deploy to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.BS_APP_SERVER_HOST }}
          username: ${{ secrets.BS_APP_SERVER_USERNAME }}
          key: ${{ secrets.BS_APP_SERVER_SSH_KEY }}
          source: "build/*"
          target: "/var/www/html"
          strip_components: 1